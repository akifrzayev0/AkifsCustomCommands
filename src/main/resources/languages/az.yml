# Discord webhook embed mətnləri.
# Discord rəng kodlarını render etmir, ona görə burada &-kodları yoxdur.
# field-broadcast -> broadcast sətrləri (rənglər təmizlənmiş plain text)
# field-commands  -> icra olunan console əmrlərinin siyahısı (kod bloku)
# Hər hansı label-ı boş qoymaq həmin sahəni embed-dən gizlədir.
discord:
  embed:
    title: "Xüsusi komanda istifadə edildi"
    description: "**%player_name%** indicə `/%command%` istifadə etdi."
    field-player: "Oyunçu"
    field-command: "Komanda"
    field-time: "İstifadə vaxtı"
    field-broadcast: "Broadcast"
    field-commands: "İcra olunan əmrlər"
    field-remaining: "Qalan istifadə sayı"
    # Aşağıdakı sətrlər "Qalan istifadə sayı" sahəsinə birləşdirilir.
    # Yalnız limiti təyin edilmiş olanlar göstərilir (>0). Sətri ""
    # etmək həmin sətri gizlədir, field-remaining label-ı boşaltmaq
    # bütün sahəni gizlədir.
    remaining-total: "Server üzrə: **%remaining%** / %limit% qalıb (%used% istifadə)"
    remaining-player: "%player_name%: **%remaining%** / %limit% qalıb"
    footer: "AkifsCustomCommands"
    time-format: "yyyy-MM-dd HH:mm:ss z"
