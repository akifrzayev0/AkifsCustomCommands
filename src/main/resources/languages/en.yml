# -------------------------------------------------------------
#  /cac list screen
# -------------------------------------------------------------
list:
  empty: "&#A0A0A0No custom commands have been created yet."
  header: "<gradient:#3FFF5C:#5CC8FF>&lCustom commands</gradient> &#A0A0A0(&#FFE45C%count%&#A0A0A0):"
  entry: "&#888888 ▸ &#FFE45C/%command% &#A0A0A0(%status%&#A0A0A0)"

# -------------------------------------------------------------
#  Default per-command messages.
#  These are used whenever a command in config.yml does NOT
#  define its own "messages.<key>" override.
# -------------------------------------------------------------
command:
  no-permission: "&#FF6B6BYou don't have permission to use this command."
  success:
    - "&#3FFF5C&l✔ &r&#3FFF5CCongratulations! Your reward has been delivered."
  already-used:
    - "&#FF6B6B&l✘ &r&#FF6B6BYou have already used this command."
  limit-reached:
    - "&#FF6B6B&l✘ &r&#FF6B6BThis campaign has reached its usage limit."
  expired:
    - "&#FF6B6B&l✘ &r&#FF6B6BThis command is no longer active."
  cooldown:
    - "&#FFE45C⏳ &#A0A0A0You must wait &#FFE45C%time_left% &#A0A0A0before using this command again."
  disabled:
    - "&#FF6B6B&l✘ &r&#FF6B6BThis command is currently disabled."

# -------------------------------------------------------------
#  Discord webhook embed
# -------------------------------------------------------------
#  Logs every successful custom-command use to the configured
#  webhook (see config.yml -> discord). Color codes are NOT
#  rendered by Discord, so do not use &-codes here.
#
#  Embed contents:
#    field-broadcast -> the public broadcast lines, with all
#                       in-game color codes removed (plain text).
#    field-commands  -> the console commands that were executed
#                       (formatted as a code block).
#  Leave a label empty (e.g. field-commands: "") to hide that
#  field from the embed.
#
#  Placeholders: %player_name%, %player_uuid%, %player_displayname%,
#                %command%, %time%
#
#  time-format follows java.text.SimpleDateFormat patterns.
# -------------------------------------------------------------
discord:
  embed:
    title: "Custom command used"
    description: "**%player_name%** just used `/%command%`."
    field-player: "Player"
    field-command: "Command"
    field-time: "Used at"
    field-broadcast: "Broadcast"
    field-commands: "Executed commands"
    field-remaining: "Remaining uses"
    # Lines below are joined into the "Remaining uses" field. Only the
    # ones whose limit is set (> 0) are shown. Set the line to "" to
    # hide it, or empty the field-remaining label to hide the field.
    remaining-total: "Server-wide: **%remaining%** of %limit% left (%used% used)"
    remaining-player: "%player_name%: **%remaining%** of %limit% left"
    footer: "AkifsCustomCommands"
    time-format: "yyyy-MM-dd HH:mm:ss z"
