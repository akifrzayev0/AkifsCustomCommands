  command-not-found: "&#FF6B6BNo custom command named &#FFE45C%command% &#FF6B6Bwas found."
  command-already-exists: "&#FF6B6BA custom command with that name already exists: &#FFE45C%command%"
  command-created: "&#3FFF5CCustom command created: &#FFE45C/%command%"
  command-deleted: "&#3FFF5CCustom command deleted: &#FFE45C%command%"
  command-enabled: "&#3FFF5CCustom command enabled: &#FFE45C%command%"
  command-disabled: "&#FFE45CCustom command disabled: &#FFE45C%command%"
  command-reset: "&#3FFF5CAll usage data was cleared for: &#FFE45C%command%"
  player-reset: "&#3FFF5C%player%&#3FFF5C's data for &#FFE45C%command% &#3FFF5Cwas cleared."
  console-cmd-added: "&#3FFF5CA new console command was added to &#FFE45C%command%&#3FFF5C."
  console-cmd-removed: "&#3FFF5CThe selected console command was removed."
  broadcast-added: "&#3FFF5CA new broadcast line was added to &#FFE45C%command%&#3FFF5C."
  broadcast-removed: "&#3FFF5CThe selected broadcast line was removed."
  broadcast-cleared: "&#3FFF5CAll broadcast lines were cleared from &#FFE45C%command%&#3FFF5C."
