# =============================================================
#  AkifsCustomCommands - English language file
# =============================================================
#  Every user-facing string lives here. Copy this file to e.g.
#  languages/de.yml or languages/fr.yml to add a translation,
#  then set "language: de" in config.yml.
#
#  Color codes:
#    Legacy:  &a, &c, &6, &l, &n ...
#    Hex:     &#RRGGBB        (1.16+)
#
#  Suggested palette (used by these defaults):
#    Accent / brand    &#3FFF5C
#    Highlight         &#FFE45C
#    Soft text         &#A0A0A0
#    Error red         &#FF6B6B
#    Cool blue         &#5CC8FF
#    Purple            &#B57BFF
#
#  Placeholders inside command-related messages:
#    %player_name%, %player_uuid%, %player_displayname%
#    %command%, %used%, %limit%, %total_used%, %total_limit%
#    %time_left% (cooldown only)
# =============================================================

# -------------------------------------------------------------
#  Generic admin / plugin messages
# -------------------------------------------------------------
