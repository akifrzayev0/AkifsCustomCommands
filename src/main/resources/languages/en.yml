  webhook-failed: "&#FF6B6BWebhook delivery failed: &#FFE45C%error%"

# -------------------------------------------------------------
#  /cac help screen
# -------------------------------------------------------------
help:
  - "&8&m                                                 "
  - "&r <gradient:#3FFF5C:#5CC8FF>&lAkifsCustomCommands</gradient> &#A0A0A0— &fAdmin panel"
  - "&8&m                                                 "
  - "&#FFE45C/cac help &#A0A0A0— Show this help"
  - "&#FFE45C/cac reload &#A0A0A0— Reload config and data"
  - "&#FFE45C/cac list &#A0A0A0— List every custom command"
  - "&#FFE45C/cac info <command> &#A0A0A0— Show command details"
  - "&#FFE45C/cac create <command> &#A0A0A0— Create a new custom command"
  - "&#FFE45C/cac delete <command> &#A0A0A0— Delete a custom command"
  - "&#FFE45C/cac enable|disable <command> &#A0A0A0— Toggle a command"
  - "&#FFE45C/cac reset <command> &#A0A0A0— Reset usage data for a command"
  - "&#FFE45C/cac resetplayer <player> <command> &#A0A0A0— Reset one player's data"
  - "&#FFE45C/cac addcmd <command> <console-cmd> &#A0A0A0— Add a console command"
  - "&#FFE45C/cac removecmd <command> <index> &#A0A0A0— Remove a console command"
  - "&#FFE45C/cac addbcast <command> <message> &#A0A0A0— Add a public broadcast line"
  - "&#FFE45C/cac removebcast <command> <index> &#A0A0A0— Remove a broadcast line"
  - "&#FFE45C/cac clearbcast <command> &#A0A0A0— Remove all broadcast lines"
  - "&#FFE45C/cac setlimit <command> <amount> &#A0A0A0— Total usage limit"
  - "&#FFE45C/cac setplayerlimit <command> <amount> &#A0A0A0— Per-player limit"
  - "&#FFE45C/cac setcooldown <command> <time> &#A0A0A0— Cooldown (e.g. &f30s, 5m, 1h, 7d&#A0A0A0)"
  - "&#FFE45C/cac setduration <command> <time> &#A0A0A0— Active lifetime (e.g. &f1h, 7d, 30d&#A0A0A0)"
  - "&#FFE45C/cac setperm <command> [permission] &#A0A0A0— Set or clear required permission"
  - "&#FFE45C/cac testwebhook <command> [player] &#A0A0A0— Send a test embed to Discord"
  - "&8&m                                                 "

