# Discord webhook embed metinleri.
# Discord renk kodlarını işlemediği için burada &-kodları kullanılmaz.
# field-broadcast -> oyun içi broadcast satırları (renk kodları temizlenmiş)
# field-commands  -> çalıştırılan konsol komutlarının listesi (kod bloğu)
# Bir label'ı boş bırakmak ilgili alanı embed'den gizler.
discord:
  embed:
    title: "Özel komut kullanıldı"
    description: "**%player_name%** az önce `/%command%` komutunu kullandı."
    field-player: "Oyuncu"
    field-command: "Komut"
    field-time: "Kullanım zamanı"
    field-broadcast: "Broadcast"
    field-commands: "Çalıştırılan komutlar"
    field-remaining: "Kalan kullanım hakkı"
    # Aşağıdaki satırlar "Kalan kullanım hakkı" alanında birleştirilir.
    # Sadece limiti ayarlanmış olanlar (>0) gösterilir. Bir satırı ""
    # yapmak o satırı gizler, field-remaining label'ını boşaltmak
    # alanın tamamını gizler.
    remaining-total: "Sunucu geneli: **%remaining%** / %limit% kaldı (%used% kullanıldı)"
    remaining-player: "%player_name%: **%remaining%** / %limit% kaldı"
    footer: "AkifsCustomCommands"
    time-format: "yyyy-MM-dd HH:mm:ss z"
